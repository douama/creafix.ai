name: Vercel Production Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          response=$(curl -sS -o /tmp/body -w "%{http_code}" -X POST "$HOOK_URL")
          echo "HTTP $response"
          cat /tmp/body
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            exit 1
          fi
